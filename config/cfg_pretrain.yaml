defaults:
  - arch: hrm_v1
  - _self_

hydra:
  output_subdir: null

data_path: data/sudoku-extreme-1k

global_batch_size: 512
epochs: 10000
eval_interval: 10000
checkpoint_every_eval: true

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 0.1
puzzle_emb_weight_decay: 0.1
puzzle_emb_lr: 1e-2

seed: 0
project_name: HRM-1step-Final
run_name: hrm_1step_final
checkpoint_path: checkpoints/hrm_1step_final
